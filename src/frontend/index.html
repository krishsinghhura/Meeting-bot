<!doctype html>
<html>
  <head>
    <title>Meeting Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="auth-view" class="auth-layout" hidden>
        <div>
          <h1>Meeting Bot</h1>
          <p class="muted">
            Sign in to submit meeting links and see only your own transcripts,
            VTT artifacts, and AI summaries.
          </p>
        </div>

        <form id="auth-form" class="panel">
          <div class="tabs" role="tablist" aria-label="Authentication mode">
            <button type="button" id="login-tab" class="tab active">
              Login
            </button>
            <button type="button" id="register-tab" class="tab">
              Register
            </button>
          </div>

          <label>
            Email
            <input type="email" id="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input
              type="password"
              id="password"
              autocomplete="current-password"
              minlength="8"
              required
            />
          </label>

          <button type="submit" id="auth-submit">Login</button>
          <div id="auth-status" class="status"></div>
        </form>
      </section>

      <section id="dashboard-view" hidden>
        <header class="topbar">
          <div>
            <h1>Meeting Dashboard</h1>
            <p id="current-user" class="muted"></p>
          </div>
          <button type="button" id="logout-button" class="secondary">
            Logout
          </button>
        </header>

        <section class="panel submit-panel">
          <form id="meeting-form">
            <label>
              Meeting link
              <input
                type="url"
                id="url"
                placeholder="https://meet.google.com/abc-defg-hij"
                required
              />
            </label>
            <button type="submit">Start Bot</button>
          </form>
          <div id="status" class="status"></div>
        </section>

        <section class="panel analytics-panel">
          <div class="section-header">
            <h2>Analytics</h2>
            <span id="analytics-status" class="muted"></span>
          </div>
          <div id="analytics-summary" class="analytics-summary"></div>
          <div class="speaker-panel">
            <h3>Speaker Participation</h3>
            <div id="speaker-participation" class="speaker-participation"></div>
          </div>
        </section>

        <section class="dashboard-grid">
          <section class="panel">
            <div class="section-header">
              <h2>Meetings</h2>
              <button type="button" id="refresh-jobs" class="secondary">
                Refresh
              </button>
            </div>
            <div id="jobs-list" class="jobs-list"></div>
          </section>

          <section class="panel">
            <h2>Results</h2>
            <div id="result-detail" class="result-detail muted">
              Select a meeting to see transcript and AI results.
            </div>
          </section>

          <section class="panel chat-panel-container">
            <h2>Ask Meeting Bot</h2>
            <div id="chat-detail-empty" class="result-detail muted">
              Select a meeting to start chatting.
            </div>
            <div id="chat-container" class="chat-container" hidden>
              <div id="chat-log" class="chat-log"></div>
              <form id="chat-form" class="chat-form">
                <input
                  type="text"
                  id="chat-input"
                  placeholder="Ask a question about this meeting..."
                  required
                />
                <button type="submit" id="chat-submit">Send</button>
              </form>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="main.ts"></script>
  </body>
</html>
